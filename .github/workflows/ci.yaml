name: Lint and Format
on:
  push:
    branches:
      # dev (not main): main only receives fast-forwards of already-tested dev
      # commits. Running on dev pushes also seeds the Rust/npm caches on the
      # default branch, which is what PR runs are allowed to restore from.
      - dev
  pull_request:
jobs:
  # npm ci runs once here; the four check jobs fan out behind `needs` and
  # restore the node_modules cache this job guarantees exists. Exact lockfile
  # match only — npm ci deletes node_modules before installing, so a stale
  # partial restore has no value.
  node_setup:
    name: Install npm dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-modules.outputs.cache-hit != 'true'
  typescript:
    name: Typescript
    needs: node_setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true
      - name: Typescript
        run: npm run tsc
  eslint:
    name: ESLint
    needs: node_setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true
      - name: ESLint
        run: npm run lint
  prettier:
    name: Prettier
    needs: node_setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true
      - name: Prettier
        run: npm run format-check
  vitest:
    name: Typescript - Vitest
    needs: node_setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true
      - name: Vitest
        run: npm test
  cargo_test:
    name: Rust - Cargo Test
    # Windows is required: the hook crate is a Windows DLL (windows-rs, DLL
    # injection, named pipes) and the tests must run natively.
    runs-on: windows-latest
    env:
      # No debuginfo (PDBs): tests don't need it, and generating/linking it
      # is a large share of Windows compile time and of the target/ cache.
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4
      # Install exactly the toolchain pinned in rust-toolchain.toml. No
      # `rustup update nightly`: that installs the day's latest nightly, which
      # the build (pinned) never uses but which lands in rust-cache's
      # environment hash — churning the cache key daily and forcing cold
      # builds.
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup set auto-self-update disable
          rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      # src-tauri's build.rs only requires that a hook.dll file EXISTS to
      # satisfy the tauri resource glob (its copy from target/release is a
      # tolerated failure), and tests never load the DLL. An empty stub
      # avoids compiling the whole hook dependency tree a second time in the
      # release profile just to produce a file nothing reads.
      - name: Stub the hook.dll resource
        shell: bash
        run: touch src-tauri/hook.dll
      # No separate `cargo build`: cargo test compiles the same lib/bin
      # targets itself, so a build step only duplicates the work.
      - run: cargo test --verbose
  cargo_check_linux:
    name: Rust - Linux check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # webkit2gtk pinned to 2.36 to match release.yaml (see the rationale
      # there) — checking against the same version the AppImage bundles means
      # a 2.36 API incompatibility fails the PR, not the release run.
      - name: Install Tauri v1 Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --allow-downgrades \
            libwebkit2gtk-4.0-dev=2.36.0-2ubuntu1 \
            libwebkit2gtk-4.0-37=2.36.0-2ubuntu1 \
            libjavascriptcoregtk-4.0-dev=2.36.0-2ubuntu1 \
            libjavascriptcoregtk-4.0-18=2.36.0-2ubuntu1 \
            gir1.2-javascriptcoregtk-4.0=2.36.0-2ubuntu1 \
            gir1.2-webkit2-4.0=2.36.0-2ubuntu1 \
            build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      # Same pinned-toolchain rationale as cargo_test: `rustup update nightly`
      # would churn rust-cache's environment hash daily.
      - name: Install pinned Rust toolchain
        run: |
          rustup set auto-self-update disable
          rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: npm ci
      # generate_context! embeds dist/ at compile time, so the frontend must
      # exist before any cargo command that compiles main.rs.
      - run: npm run build
      # Same stub rationale as cargo_test: the tauri resource glob in build.rs
      # requires a hook.dll file to exist; nothing on Linux CI loads it.
      - name: Stub the hook.dll resource
        run: touch src-tauri/hook.dll
      - run: cargo check -p protocol
      - run: cargo check -p gbfr-logs
      # --lib --bins: examples are windows-only diag tools and must not build here.
      - run: cargo test -p gbfr-logs --lib --bins
