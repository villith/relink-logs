name: Release

# Branch model (versions are managed by CI — do not hand-bump them):
#
#   PRs target dev (the default branch). Every push to dev auto-bumps to the
#   next RC version (X.Y.Z-N), commits the bump to the five version files, and
#   publishes a fully signed GitHub *prerelease* — downloadable for testing,
#   but invisible to installed apps, because GitHub never serves prereleases
#   from releases/latest (the updater endpoint).
#
#   Releasing = pressing "Run workflow" on this workflow (from dev). CI strips
#   the RC suffix ON dev, requires the human-written CHANGELOG.md section for
#   that version (it becomes the release body and the in-app update prompt),
#   builds and publishes the stable release from that commit, then
#   FAST-FORWARDS main to it. main is a pointer to the last released state of
#   dev — always an ancestor of dev, so the branches cannot diverge and
#   nothing ever needs merging back. Never push to main directly: the promote
#   job's plain (non-force) push will refuse to move a diverged main.
#
#   Version choice on dev: the base is whatever the files carry when it is
#   ahead of the newest stable tag — set e.g. 1.13.0 in a PR to make the next
#   release minor/major — otherwise the newest stable tag plus a patch bump.
#   The RC number is the next -N not already tagged. N is numeric because WiX
#   turns it into the MSI ProductVersion's 4th field and rejects -rc.N style.
#
#   CI's pushes to dev (RC bumps and the stable strip) go over SSH with the
#   RELEASE_DEPLOY_KEY write deploy key: dev and main sit behind rulesets
#   (PR required + verified signatures), personal repos cannot grant the
#   Actions app a ruleset bypass, but a deploy key CAN be a bypass actor.
#   Deploy-key pushes DO trigger workflows (unlike GITHUB_TOKEN), so every
#   CI-authored commit starts with "chore(release):" and the version job
#   skips such pushes. The release tag is created atomically with the GitHub
#   release (gh release create --target), so a failed build strands nothing;
#   pushing again (or re-dispatching) retries.
#
# Two independent signatures are applied, and the ORDER MATTERS:
#   1. Authenticode (Azure Artifact Signing) — what Windows/SmartScreen/UAC check.
#   2. minisign (TAURI_PRIVATE_KEY) — what the in-app updater checks.
# minisign covers the *bytes* of the updater artifact, so Authenticode must be
# applied first. The bundler enforces this itself via
# bundle.windows.signCommand (Tauri >= 1.7): it signs the exe and MSI with
# scripts/ci-sign.ps1 during bundling, then zips the SIGNED MSI and minisigns
# it. Only hook.dll is signed separately — it is a resource, and the bundler
# does not sign resources.

on:
  push:
    branches:
      - dev
  workflow_dispatch: # the release button — publishes a stable from dev

# Rapid merges must not race the version computation or publish the same
# version twice.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    # Recursion guard: CI's own deploy-key pushes (RC bumps, the stable strip)
    # start with "chore(release):" and must not trigger another release. The
    # author check matters: "chore(release):" is also a plausible human commit
    # subject, and matching on the message alone would silently skip the whole
    # release for that push.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          !(startsWith(github.event.head_commit.message, 'chore(release):') &&
            github.event.head_commit.author.email == '41898282+github-actions[bot]@users.noreply.github.com') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # pushes go over SSH with the deploy key, not GITHUB_TOKEN
    outputs:
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.v.outputs.sha }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The branch, not the push SHA: the bump commit must land on the
          # branch tip, and the build then uses that exact commit.
          ref: dev
          fetch-depth: 0 # next-version.mjs needs the full tag list

      # Rulesets on dev and main block direct pushes; the write deploy key is
      # a ruleset bypass actor, so CI pushes authenticate with it over SSH.
      # Fetches keep using GITHUB_TOKEN via the https remote.
      - name: Use the release deploy key for pushes
        shell: bash
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          if [[ -z "$RELEASE_DEPLOY_KEY" ]]; then
            echo "::error::RELEASE_DEPLOY_KEY secret is missing - CI cannot push version bumps."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$RELEASE_DEPLOY_KEY" > "$HOME/.ssh/release_bot"
          chmod 600 "$HOME/.ssh/release_bot"
          git remote set-url --push origin "git@github.com:$GITHUB_REPOSITORY.git"
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/release_bot -o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

      - name: Compute next version and commit the bump
        id: v
        shell: bash
        run: |
          file_version="$(node -p "require('./package.json').version")"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$GITHUB_REF_NAME" != "dev" ]]; then
              echo "::error::Releases are dispatched from the dev branch, not $GITHUB_REF_NAME."
              exit 1
            fi
            prerelease=false
            next="$(node scripts/next-version.mjs main "$file_version")"
            if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
              echo "::error::$next is already released - merge new work into dev before dispatching a release."
              exit 1
            fi
            # Gate BEFORE committing anything: the section is the release
            # body, and it must be written by a human. The dispatch simply
            # fails here until the changelog exists on dev.
            node scripts/extract-changelog.mjs "$next" > /dev/null
          else
            prerelease=true
            next="$(git tag | node scripts/next-version.mjs dev "$file_version")"
          fi

          echo "Releasing $next (files carried $file_version)"
          # Run unconditionally, even when $next already equals $file_version:
          # set-version.mjs verifies that ALL five files carry the version, so
          # this is the only thing that enforces the "they must always agree"
          # invariant. Committing is then gated on whether anything actually
          # changed, which also makes a re-run of an already-bumped commit a
          # no-op instead of an empty commit.
          node scripts/set-version.mjs "$next"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): $next"
            # A human push can race ours; rebase the bump onto it and retry.
            pushed=false
            for i in 1 2 3; do
              if git push origin HEAD:dev; then pushed=true; break; fi
              # Bare `git pull` here would abort the step under `set -e`,
              # skipping the remaining attempts AND the error message below.
              if ! git pull --rebase origin dev; then
                git rebase --abort || true
                echo "::error::could not rebase the version bump onto dev (conflict) - resolve by hand"
                exit 1
              fi
            done
            if [[ "$pushed" != "true" ]]; then
              echo "::error::could not push the version-bump commit to dev"
              exit 1
            fi
          fi

          {
            echo "version=$next"
            echo "prerelease=$prerelease"
            echo "sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: version
    runs-on: windows-latest
    permissions:
      contents: write # required to create the GitHub Release (and its tag)
    env:
      VERSION: ${{ needs.version.outputs.version }}
      PRERELEASE: ${{ needs.version.outputs.prerelease }}
      TARGET_SHA: ${{ needs.version.outputs.sha }}
      # productName in tauri.conf.json. Drives every artifact filename below.
      PRODUCT: GBFR Logs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }} # the version-bump commit

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install nightly Rust
        shell: bash
        run: |
          rustup set auto-self-update disable
          rustup update nightly && rustup default nightly

      # Default mapping (`. -> target`): the cargo workspace root is the repo
      # root — that's where target/ lives.
      - uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      # The release body doubles as the updater prompt's patch notes: it is
      # copied into latest.json as `notes` further down. Stable versions are
      # guaranteed a section by the version job; RCs fall back to placeholder
      # notes.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          if notes="$(node scripts/extract-changelog.mjs "$VERSION")"; then
            echo "Using the CHANGELOG.md section for $VERSION."
          elif [[ "$PRERELEASE" == "true" ]]; then
            notes="Release candidate $VERSION — a test build published from the dev branch. Not intended for general use."
          else
            exit 1
          fi
          # Randomised delimiter: a changelog section containing a literal
          # NOTES_EOF line would otherwise close the heredoc early and let the
          # rest of the notes be parsed as arbitrary step outputs.
          delim="NOTES_EOF_${RANDOM}${RANDOM}${RANDOM}"
          {
            echo "body<<$delim"
            echo "$notes"
            echo ""
            echo "Make sure to save and exit the game before updating."
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      # The release build bundles src-tauri/hook.dll as a Tauri resource, but
      # nothing in `tauri build` produces it. Build the hook crate first and place
      # the DLL where the resource glob expects it (mirrors scripts/build.ps1).
      - name: Build hook DLL
        run: cargo build --release --package hook

      # hook.dll is a *resource*, and the Tauri v1 bundler does not sign
      # resources — so it must be signed here, before it is staged and
      # packaged. It is also the file AV cares about most, since it gets
      # injected into the game process. Side effect this pipeline relies on:
      # this action installs the TrustedSigning PowerShell module, which
      # scripts/ci-sign.ps1 (the bundler's signCommand) uses during the build.
      - name: Sign hook.dll
        uses: azure/trusted-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\target\release\hook.dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage signed hook.dll
        shell: bash
        run: cp target/release/hook.dll src-tauri/hook.dll

      # The frontend is built here for clearer failure attribution; the
      # overlay config disables beforeBuildCommand so the bundler doesn't
      # rebuild it. The overlay also carries bundle.windows.signCommand
      # (Tauri >= 1.7 / npm CLI >= 1.6), pointing the bundler at
      # scripts/ci-sign.ps1 — the bundler then signs the exe and the MSI
      # itself, at the right points in its own sequence, and produces the
      # updater zip FROM the signed MSI. signCommand lives only in this
      # CI-written overlay, never in tauri.conf.json, so local builds stay
      # unsigned and need no Azure credentials.
      - name: Build frontend and write CI build config
        shell: pwsh
        run: |
          npm run build
          $cfg = [ordered]@{
            build = @{ beforeBuildCommand = "" }
            tauri = @{ bundle = @{ windows = @{
              signCommand = "pwsh -NoProfile -ExecutionPolicy Bypass -File $env:GITHUB_WORKSPACE\scripts\ci-sign.ps1 %1"
            } } }
          }
          $cfg | ConvertTo-Json -Depth 6 | Set-Content -Path .tauri-release-config.json -Encoding utf8
          Get-Content .tauri-release-config.json

      # One pass: compile → sign exe (signCommand) → bundle MSI → sign MSI
      # (signCommand) → zip the signed MSI as the updater artifact → minisign
      # it with TAURI_PRIVATE_KEY. The ordering constraint (Authenticode
      # before minisign) is satisfied inside the bundler itself. The updater
      # key is unencrypted, hence the empty TAURI_KEY_PASSWORD.
      - name: Build, sign, and bundle app
        run: npx tauri build -b msi,updater --config .tauri-release-config.json
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # Resolves to "" while the key is unencrypted (the secret does not
          # exist), but routing it through a secret means rotating to a
          # passphrase-protected key is a secrets change, not a workflow edit.
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ vars.AZURE_CERT_PROFILE }}

      - name: Verify exe and MSI signatures
        shell: pwsh
        run: |
          # src-tauri/hook.dll is the copy that actually ships inside the MSI,
          # and it is signed by a separate step — verify it here too, so the
          # bundled resource is covered by the same check as the exe and MSI.
          $msi = @(Get-ChildItem "target/release/bundle/msi/*.msi")
          # Assert explicitly: an empty glob would otherwise shrink $files and
          # let the loop "pass" without ever checking an MSI.
          if ($msi.Count -ne 1) { throw "expected exactly 1 MSI, found $($msi.Count)" }
          $files = @("target/release/$env:PRODUCT.exe", "src-tauri/hook.dll") + $msi.FullName
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature $f
            Write-Host "$f -> $($sig.Status): $($sig.SignerCertificate.Subject)"
            if ($sig.Status -ne 'Valid') { throw "$f is not validly signed." }
          }
          $zip = Get-ChildItem "target/release/bundle/msi/*.msi.zip" | Select-Object -First 1
          if (-not $zip) { throw "bundler did not produce the updater .msi.zip" }
          if (-not (Test-Path "$($zip.FullName).sig")) { throw "bundler did not minisign the updater artifact" }

      # Hand-built because tauri-action is no longer doing the build. GitHub
      # rewrites spaces in uploaded asset names to dots, so the download URL
      # must use the rewritten name.
      - name: Generate latest.json
        shell: pwsh
        env:
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          $msiDir = "target/release/bundle/msi"
          $zip = Get-ChildItem "$msiDir/*.msi.zip" | Select-Object -First 1
          # Without this, a missing zip makes $zip.FullName silently $null and
          # the step dies later on $signature.Trim() with an unrelated message.
          if (-not $zip) { throw "no updater .msi.zip found in $msiDir" }
          $signature = Get-Content "$($zip.FullName).sig" -Raw
          $assetName = $zip.Name -replace ' ', '.'
          $manifest = [ordered]@{
            version   = $env:VERSION
            notes     = $env:NOTES
            pub_date  = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature.Trim()
                url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:VERSION/$assetName"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File "$msiDir/latest.json" -Encoding utf8
          Get-Content "$msiDir/latest.json"

      # Published (not draft) so releases/latest/download/latest.json resolves —
      # that manifest is the updater endpoint. `--target` creates the version tag
      # on the version-bump commit, atomically with the release; the .sig is not
      # uploaded because the updater reads the signature from latest.json, never
      # from a file. RCs are published with --prerelease, which GitHub excludes
      # from releases/latest — installed apps never see them (their latest.json
      # stays reachable via the versioned download URL, which is how an RC
      # update flow is tested by hand).
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          $msiDir = "target/release/bundle/msi"
          # $env:NOTES, not $NOTES: PowerShell does not expose environment
          # variables as bare variables, so $NOTES would be $null and the
          # release would publish with an empty body.
          $env:NOTES | Out-File notes.md -Encoding utf8
          $assets = @(
            (Get-ChildItem "$msiDir/*.msi").FullName
            (Get-ChildItem "$msiDir/*.msi.zip").FullName
            (Resolve-Path "$msiDir/latest.json").Path
          )
          $extra = @()
          if ($env:PRERELEASE -eq 'true') { $extra += '--prerelease' }
          gh release create $env:VERSION $assets --target $env:TARGET_SHA --title "Relink Logs $env:VERSION" --notes-file notes.md @extra

  # After a stable release, move main to the released commit. This is a plain
  # fast-forward push: the released commit is on dev, and main is always an
  # ancestor of dev because this job is the ONLY thing that moves main. If the
  # push is rejected as non-fast-forward, someone pushed to main directly —
  # reconcile by hand (get those changes onto dev via a PR), never force-push.
  promote:
    needs: [version, release]
    if: needs.version.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - name: Fast-forward main to the released commit
        shell: bash
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          if [[ -z "$RELEASE_DEPLOY_KEY" ]]; then
            echo "::error::RELEASE_DEPLOY_KEY secret is missing - CI cannot fast-forward main."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$RELEASE_DEPLOY_KEY" > "$HOME/.ssh/release_bot"
          chmod 600 "$HOME/.ssh/release_bot"
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/release_bot -o StrictHostKeyChecking=accept-new"
          git push "git@github.com:$GITHUB_REPOSITORY.git" "${{ needs.version.outputs.sha }}:refs/heads/main"
