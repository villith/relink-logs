name: Release

# Branch model (versions are managed by CI — do not hand-bump them):
#
#   PRs target dev. Every push to dev auto-bumps to the next RC version
#   (X.Y.Z-N), commits the bump to the four version files, and publishes a
#   fully signed GitHub *prerelease* — downloadable for testing, but invisible
#   to installed apps, because GitHub never serves prereleases from
#   releases/latest (the updater endpoint).
#
#   Releasing = merging dev into main. The RC suffix is stripped, the stable
#   version is committed to main, the release ships, and main is merged back
#   into dev so the next dev→main merge cannot conflict on version lines.
#
#   Version choice on dev: the base is whatever the files carry when it is
#   ahead of the newest stable tag — set e.g. 1.13.0 in a PR to make the next
#   release minor/major — otherwise the newest stable tag plus a patch bump.
#   The RC number is the next -N not already tagged. N is numeric because WiX
#   turns it into the MSI ProductVersion's 4th field and rejects -rc.N style.
#
#   Stable releases REQUIRE a human-written CHANGELOG.md section (it becomes
#   the release body and the in-app update prompt); the version job fails the
#   dev→main merge until one exists. RCs use the section if present,
#   placeholder notes otherwise.
#
#   The version-bump, strip, and back-merge commits are pushed over SSH with
#   the RELEASE_DEPLOY_KEY write deploy key: both branches sit behind rulesets
#   (PR required + verified signatures), personal repos cannot grant the
#   Actions app a ruleset bypass, but a deploy key CAN be a bypass actor.
#   Deploy-key pushes DO trigger workflows (unlike GITHUB_TOKEN), so the
#   version job skips any push whose head commit starts with
#   "chore(release):" — every CI-authored commit uses that prefix. The tag is
#   created atomically with the release (gh release create --target), so a
#   failed build strands nothing; the next push retries.
#
# Two independent signatures are applied, and the ORDER MATTERS:
#   1. Authenticode (Azure Artifact Signing) — what Windows/SmartScreen/UAC check.
#   2. minisign (TAURI_PRIVATE_KEY) — what the in-app updater checks.
# minisign covers the *bytes* of the updater artifact, so Authenticode must be
# applied first. Signing after minisign would invalidate every auto-update.

on:
  push:
    branches:
      - main
      - dev

# Rapid merges must not race the version computation or publish the same
# version twice.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    # Recursion guard: CI's own pushes (version bumps, the stable strip, the
    # back-merge) all start with "chore(release):" and must not release again.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # pushes go over SSH with the deploy key, not GITHUB_TOKEN
    outputs:
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.v.outputs.sha }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The branch, not the push SHA: the bump commit must land on the
          # branch tip, and the build then uses that exact commit.
          ref: ${{ github.ref_name }}
          fetch-depth: 0 # next-version.mjs needs the full tag list

      # Rulesets on dev and main block direct pushes; the write deploy key is
      # a ruleset bypass actor, so CI pushes authenticate with it over SSH.
      # Fetches keep using GITHUB_TOKEN via the https remote.
      - name: Use the release deploy key for pushes
        shell: bash
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          if [[ -z "$RELEASE_DEPLOY_KEY" ]]; then
            echo "::error::RELEASE_DEPLOY_KEY secret is missing - CI cannot push version bumps."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$RELEASE_DEPLOY_KEY" > "$HOME/.ssh/release_bot"
          chmod 600 "$HOME/.ssh/release_bot"
          git remote set-url --push origin "git@github.com:$GITHUB_REPOSITORY.git"
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/release_bot -o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

      - name: Compute next version and commit the bump
        id: v
        shell: bash
        run: |
          file_version="$(node -p "require('./package.json').version")"

          if [[ "$GITHUB_REF_NAME" == "dev" ]]; then
            prerelease=true
            next="$(git tag | node scripts/next-version.mjs dev "$file_version")"
          else
            prerelease=false
            next="$(git tag | node scripts/next-version.mjs main "$file_version")"
            if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
              echo "Tag $next already exists; nothing to release."
              {
                echo "version=$next"
                echo "prerelease=$prerelease"
                echo "should_release=false"
                echo "sha=$GITHUB_SHA"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Gate BEFORE committing anything: the section is the release body,
            # and it must be written by a human. The merge simply fails here
            # until the changelog exists.
            node scripts/extract-changelog.mjs "$next" > /dev/null
          fi

          echo "Releasing $next (files carried $file_version)"
          if [[ "$next" != "$file_version" ]]; then
            node scripts/set-version.mjs "$next"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml Cargo.lock
            git commit -m "chore(release): $next"
            # A human push can race ours; rebase the bump onto it and retry.
            pushed=false
            for i in 1 2 3; do
              if git push origin "HEAD:$GITHUB_REF_NAME"; then pushed=true; break; fi
              git pull --rebase origin "$GITHUB_REF_NAME"
            done
            if [[ "$pushed" != "true" ]]; then
              echo "::error::could not push the version-bump commit to $GITHUB_REF_NAME"
              exit 1
            fi
          fi

          {
            echo "version=$next"
            echo "prerelease=$prerelease"
            echo "should_release=true"
            echo "sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    permissions:
      contents: write # required to create the GitHub Release (and its tag)
    env:
      VERSION: ${{ needs.version.outputs.version }}
      PRERELEASE: ${{ needs.version.outputs.prerelease }}
      TARGET_SHA: ${{ needs.version.outputs.sha }}
      # productName in tauri.conf.json. Drives every artifact filename below.
      PRODUCT: GBFR Logs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }} # the version-bump commit

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install nightly Rust
        shell: bash
        run: |
          rustup set auto-self-update disable
          rustup update nightly && rustup default nightly

      # Default mapping (`. -> target`): the cargo workspace root is the repo
      # root — that's where target/ lives.
      - uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      # The release body doubles as the updater prompt's patch notes: it is
      # copied into latest.json as `notes` further down. Stable versions are
      # guaranteed a section by the version job; RCs fall back to placeholder
      # notes.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          if notes="$(node scripts/extract-changelog.mjs "$VERSION")"; then
            echo "Using the CHANGELOG.md section for $VERSION."
          elif [[ "$PRERELEASE" == "true" ]]; then
            notes="Release candidate $VERSION — a test build published from the dev branch. Not intended for general use."
          else
            exit 1
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$notes"
            echo ""
            echo "Make sure to save and exit the game before updating."
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # The release build bundles src-tauri/hook.dll as a Tauri resource, but
      # nothing in `tauri build` produces it. Build the hook crate first and place
      # the DLL where the resource glob expects it (mirrors scripts/build.ps1).
      - name: Build hook DLL
        run: cargo build --release --package hook

      # hook.dll is a *resource*, and the Tauri v1 bundler does not sign
      # resources — so it must be signed here, before it is staged and packaged.
      # It is also the file AV cares about most, since it gets injected into the
      # game process. It must be final BEFORE pass 1 so nothing the build passes
      # watch changes between them.
      - name: Sign hook.dll
        uses: azure/trusted-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\target\release\hook.dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage signed hook.dll
        shell: bash
        run: cp target/release/hook.dll src-tauri/hook.dll

      # The frontend is built ONCE, here, instead of via beforeBuildCommand.
      # In Tauri v1 dist/ is embedded into the exe at compile time and
      # tauri-build watches it, so if pass 2 re-ran `npm run build` the fresh
      # dist/ mtimes would force a recompile and clobber the signed exe. Both
      # tauri passes therefore run with beforeBuildCommand disabled — via the
      # SAME --config file, so nothing the build script sees differs between
      # passes.
      - name: Build frontend
        shell: pwsh
        run: |
          npm run build
          Set-Content -Path .tauri-release-config.json -Value '{"build":{"beforeBuildCommand":""}}' -Encoding utf8

      # Pass 1 compiles the app binary so it can be signed; bundling is skipped
      # (`-b none`) — an MSI built now would wrap an unsigned exe and be thrown
      # away. No updater artifact is produced in either pass, so neither needs
      # TAURI_PRIVATE_KEY. After the build the CLI *moves* (std::fs::rename)
      # target/release/gbfr-logs.exe to "GBFR Logs.exe" (productName).
      - name: Build app (pass 1 — compile only)
        run: npx tauri build -b none --config .tauri-release-config.json

      # Signed here rather than inside the bundler because Tauri 1.5 can only
      # drive signtool via `certificateThumbprint` (a cert in the machine store),
      # which Artifact Signing's short-lived, dlib-issued certs cannot satisfy.
      # This is the signature users see in the UAC prompt on every launch.
      - name: Sign app binary
        uses: azure/trusted-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\target\release\${{ env.PRODUCT }}.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Pass 1's rename left cargo's own output path (gbfr-logs.exe) EMPTY, and
      # cargo restores a missing output from deps/ — unsigned — even when the
      # build is otherwise fresh. Put the SIGNED bytes back at cargo's output
      # path instead: cargo never touches an output that already exists, so
      # pass 2 stays fresh and its rename moves this signed copy into place.
      - name: Restore signed binary to cargo output path
        shell: pwsh
        run: Copy-Item "target/release/$env:PRODUCT.exe" target/release/gbfr-logs.exe

      # Same sources, same config, dist/ untouched → cargo is fully fresh; the
      # bundler packages the signed exe and signed hook.dll into the MSI. If
      # anything DID recompile, the signature is silently lost — the next step
      # catches that and fails the job (nothing is stranded: no tag exists yet).
      - name: Build app (pass 2 — bundle MSI from signed binary)
        run: npx tauri build -b msi --config .tauri-release-config.json

      - name: Verify the packaged binary is still signed
        shell: pwsh
        run: |
          $exe = "target/release/$env:PRODUCT.exe"
          $sig = Get-AuthenticodeSignature $exe
          Write-Host "$exe -> $($sig.Status): $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') {
            throw "Pass 2 rebuilt the binary and dropped its Authenticode signature."
          }

      - name: Sign MSI installer
        uses: azure/trusted-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\target\release\bundle\msi
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # The updater artifact (.msi.zip + minisign signature) is built by hand
      # from the signed MSI. The updater key is unencrypted, hence the empty
      # password.
      - name: Build and minisign the updater artifact
        shell: pwsh
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          $msiDir = "target/release/bundle/msi"
          $msi = Get-ChildItem "$msiDir/*.msi" | Select-Object -First 1
          $zip = Join-Path $msiDir "$($msi.Name).zip"
          Write-Host "Packaging signed $($msi.Name)"
          Compress-Archive -Path $msi.FullName -DestinationPath $zip -Force
          npx tauri signer sign --private-key "$env:TAURI_PRIVATE_KEY" --password "" $zip
          if (-not (Test-Path "$zip.sig")) { throw "minisign did not produce $zip.sig" }

      # Hand-built because tauri-action is no longer doing the build. GitHub
      # rewrites spaces in uploaded asset names to dots, so the download URL
      # must use the rewritten name.
      - name: Generate latest.json
        shell: pwsh
        env:
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          $msiDir = "target/release/bundle/msi"
          $zip = Get-ChildItem "$msiDir/*.msi.zip" | Select-Object -First 1
          $signature = Get-Content "$($zip.FullName).sig" -Raw
          $assetName = $zip.Name -replace ' ', '.'
          $manifest = [ordered]@{
            version   = $env:VERSION
            notes     = $env:NOTES
            pub_date  = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature.Trim()
                url = "https://github.com/villith/relink-logs/releases/download/$env:VERSION/$assetName"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File "$msiDir/latest.json" -Encoding utf8
          Get-Content "$msiDir/latest.json"

      # Published (not draft) so releases/latest/download/latest.json resolves —
      # that manifest is the updater endpoint. `--target` creates the version tag
      # on the version-bump commit, atomically with the release; the .sig is not
      # uploaded because the updater reads the signature from latest.json, never
      # from a file. RCs are published with --prerelease, which GitHub excludes
      # from releases/latest — installed apps never see them (their latest.json
      # stays reachable via the versioned download URL, which is how an RC
      # update flow is tested by hand).
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          $msiDir = "target/release/bundle/msi"
          $NOTES | Out-File notes.md -Encoding utf8
          $assets = @(
            (Get-ChildItem "$msiDir/*.msi").FullName
            (Get-ChildItem "$msiDir/*.msi.zip").FullName
            (Resolve-Path "$msiDir/latest.json").Path
          )
          $extra = @()
          if ($env:PRERELEASE -eq 'true') { $extra += '--prerelease' }
          gh release create $env:VERSION $assets --target $env:TARGET_SHA --title "Relink Logs $env:VERSION" --notes-file notes.md @extra

  # After a stable release, fold main (now carrying the stripped version and
  # any release-only commits) back into dev so the next dev→main merge cannot
  # conflict. `-X ours` keeps dev's side of any overlapping hunk — the only
  # overlap main can introduce is the version lines, and dev's newer RC version
  # is the correct survivor. The push triggers a dev run that the version job's
  # chore(release): guard immediately skips.
  backmerge:
    needs: [version, release]
    if: needs.version.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - name: Merge main back into dev
        shell: bash
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$RELEASE_DEPLOY_KEY" > "$HOME/.ssh/release_bot"
          chmod 600 "$HOME/.ssh/release_bot"
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/release_bot -o StrictHostKeyChecking=accept-new"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge origin/main -X ours -m "chore(release): merge main back into dev after ${{ needs.version.outputs.version }}"
          git push "git@github.com:$GITHUB_REPOSITORY.git" dev
