name: Translation fix / new language
description: Report a wrong or missing translation, or request a new language. No coding knowledge needed.
title: "[Translation]: "
labels: ["translation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve GBFR Logs translations!

        **Note:** most item / weapon / skill **names** come directly from the game's own data files. But some labels (skills, sigils, traits, abilities the game data doesn't name) are maintained by hand — if you see a missing one (e.g. `Skill 3aa04f2a` or `Unknown (…)`) or a wrong one, report it here with the "Missing or wrong skill / sigil / trait / item label" type.
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - English (en)
        - 简体中文 (zh-CN)
        - 繁體中文 (zh-TW)
        - 한국어 (ko-KR)
        - 日本語 (jp)
        - Français (fr-FR)
        - Português brasileiro (bp)
        - Deutsch (ge)
        - Español (es-ES)
        - Italiano (it-IT)
        - Other / new language
    validations:
      required: true
  - type: dropdown
    id: change-type
    attributes:
      label: Type of change
      options:
        - Wrong translation
        - Typo
        - Text shows in English (untranslated)
        - Missing or wrong skill / sigil / trait / item label (game data)
        - Request a new language
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Where does the text appear?
      description: Which window / screen / button? You can paste a screenshot directly into this box.
    validations:
      required: true
  - type: input
    id: current-text
    attributes:
      label: Current text
      description: "The text exactly as the app shows it now — for missing labels include the placeholder id, e.g. `Skill 3aa04f2a`. Leave empty for new-language requests."
  - type: input
    id: suggested-text
    attributes:
      label: Suggested text
      description: What it should say instead. Leave empty for new-language requests.
  - type: textarea
    id: notes
    attributes:
      label: More fixes or notes (optional)
      description: "You can batch several fixes in one issue — one per line, e.g.: `current text → suggested text`"
